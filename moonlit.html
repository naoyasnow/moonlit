<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moon Phase Sanctuary</title>
    <!-- Core Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Shippori Mincho', serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            width: 100vw;
            background-color: #0d0d12;
            transition: background-color 3s, color 3s;
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .animate-spin-slow {
            animation: spin 60s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .fade-in {
            animation: fadeIn 4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .no-scroll-x {
            max-width: 100%;
            overflow-x: hidden;
        }
        textarea::placeholder { opacity: 0.3; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="no-scroll-x">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const firebaseConfig = typeof __firebase_config !== 'undefined'
            ? JSON.parse(__firebase_config)
            : { apiKey: "", authDomain: "", projectId: "", storageBucket: "", messagingSenderId: "", appId: "" };

        const MOON_PHASES = [
            { nameEn: "New Moon", nameJp: "新月", icon: "🌑" },
            { nameEn: "Waxing Crescent", nameJp: "三日月", icon: "🌒" },
            { nameEn: "First Quarter", nameJp: "上弦の月", icon: "🌓" },
            { nameEn: "Waxing Gibbous", nameJp: "十三夜月", icon: "🌔" },
            { nameEn: "Full Moon", nameJp: "満月", icon: "🌕" },
            { nameEn: "Waning Gibbous", nameJp: "十六夜月", icon: "🌖" },
            { nameEn: "Last Quarter", nameJp: "下弦の月", icon: "🌗" },
            { nameEn: "Waning Crescent", nameJp: "有明の月", icon: "🌘" }
        ];
        const LUNAR_MONTH = 29.530588853;
        const REFERENCE_NEW_MOON = new Date('2000-01-06T18:14:00Z');

        function App() {
            const [previewMode, setPreviewMode] = useState('auto');
            const canvasRef = useRef(null);

            const getMoonData = () => {
                const now = new Date();
                const diffInDays = (now.getTime() - REFERENCE_NEW_MOON.getTime()) / (1000 * 60 * 60 * 24);
                const age = diffInDays % LUNAR_MONTH;
                const phaseIndex = Math.floor(((age + (LUNAR_MONTH / 16)) / LUNAR_MONTH) * 8) % 8;
                const phase = MOON_PHASES[phaseIndex];

                let mode = 'transition';
                if (age < 0.8 || age > 28.7) mode = 'new';
                else if (age > 13.8 && age < 15.7) mode = 'full';

                return { age, phase, mode, dateStr: `${now.getFullYear()}.${now.getMonth() + 1}.${now.getDate()}` };
            };

            const data = getMoonData();
            const activeMode = previewMode === 'auto' ? data.mode : previewMode;

            const styles = (() => {
                if (activeMode === 'new') return { bg: '#000000', color: '#d4af37', aura: 'rgba(212, 175, 55, 0.4)', svgFill: '#d4af37', pColor: 'rgba(212, 175, 55, 0)' };
                if (activeMode === 'full') return { bg: '#0a0b14', color: '#f0f0f0', aura: 'rgba(255, 253, 160, 0.3)', svgFill: '#e0e0a0', pColor: 'rgba(255, 253, 160, 0.8)' };
                // 遷移期のフォントカラーを調整。svgFill(回転文字)も明るめのグレー(#999999)へ変更
                return { bg: '#0d0d12', color: '#b0b0b0', aura: 'rgba(255, 255, 255, 0.15)', svgFill: '#999999', pColor: 'rgba(255, 255, 255, 0.4)' };
            })();

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let animationFrameId;
                let particles = [];

                const resize = () => {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                };
                window.addEventListener('resize', resize);
                resize();

                class Particle {
                    constructor() { this.init(); }
                    init() {
                        this.x = Math.random() * canvas.width;
                        this.y = Math.random() * canvas.height;
                        this.size = activeMode === 'full' ? Math.random() * 2.2 + 0.5 : Math.random() * 1.5 + 0.2;
                        this.vx = (Math.random() - 0.5) * (activeMode === 'full' ? 0.8 : 0.3);
                        this.vy = (Math.random() - 0.5) * (activeMode === 'full' ? 0.8 : 0.3);
                        this.alpha = Math.random() * 0.8 + 0.2;
                    }
                    update() {
                        this.x += this.vx; this.y += this.vy;
                        if (this.x < 0) this.x = canvas.width; if (this.x > canvas.width) this.x = 0;
                        if (this.y < 0) this.y = canvas.height; if (this.y > canvas.height) this.y = 0;
                    }
                    draw() {
                        ctx.fillStyle = styles.pColor; ctx.globalAlpha = this.alpha;
                        ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
                    }
                }

                const count = activeMode === 'new' ? 0 : (activeMode === 'full' ? 160 : 70);
                particles = Array.from({ length: count }, () => new Particle());

                const animate = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    particles.forEach(p => { p.update(); p.draw(); });
                    animationFrameId = requestAnimationFrame(animate);
                };
                animate();
                return () => { cancelAnimationFrame(animationFrameId); window.removeEventListener('resize', resize); };
            }, [activeMode, styles.pColor]);

            return (
                <div className="min-h-screen w-full relative flex flex-col items-center no-scroll-x" style={{ backgroundColor: styles.bg, color: styles.color }}>
                    <canvas ref={canvasRef} />

                    <main className="relative z-10 flex flex-col items-center py-20 w-full max-w-lg px-6 box-border overflow-hidden">

                        <div className="relative w-72 h-72 sm:w-80 sm:h-80 flex items-center justify-center mb-24 flex-shrink-0">
                            <div className="absolute w-44 h-44 rounded-full transition-all duration-[4000ms] blur-2xl"
                                style={{ background: `radial-gradient(circle, ${styles.aura} 0%, transparent 80%)`, transform: `scale(${activeMode === 'full' ? 2.5 : 1.2})` }} />

                            <div className="text-7xl sm:text-8xl select-none z-10 drop-shadow-[0_0_20px_rgba(255,255,255,0.1)]">
                                {activeMode === 'new' ? '🌑' : activeMode === 'full' ? '🌕' : data.phase.icon}
                            </div>

                            <svg className="absolute w-full h-full animate-spin-slow pointer-events-none z-20" viewBox="0 0 300 300">
                                <path id="textPath" fill="none" d="M 150, 150 m -135, 0 a 135,135 0 1,1 270,0 a 135,135 0 1,1 -270,0" />
                                <text fontSize="7.5" className="uppercase tracking-[0.4em] font-sans opacity-80" style={{ fill: styles.svgFill }}>
                                    <textPath href="#textPath">
                                        {activeMode === 'full'
                                            ? `FULL MOON REVELATION --- ${data.dateStr} --- OPEN YOUR ARCHIVE --- `.repeat(3)
                                            : activeMode === 'new'
                                            ? `NEW MOON SILENCE --- ${data.dateStr} --- GOLDEN SEED --- `.repeat(3)
                                            : `LUNAR AGE: ${data.age.toFixed(1)} --- ${data.phase.nameEn} --- ${data.phase.nameJp} --- `.repeat(3)
                                        }
                                    </textPath>
                                </text>
                            </svg>
                        </div>

                        <div className="w-full text-center max-w-full drop-shadow-sm">
                            {activeMode === 'new' ? (
                                <div className="fade-in space-y-8">
                                    <h1 className="text-3xl font-light tracking-[0.8em]">新月</h1>
                                    <div className="p-8 sm:p-10 border border-current/10 bg-white/[0.03] backdrop-blur-md">
                                        <p className="text-sm italic leading-relaxed text-justify">
                                            この闇は、何かが失われた姿ではなく、すべての可能性が眠る種の状態です。
                                            言葉を紡ぐのをやめ、心の奥底にある黄金の輝きをただ静かに見つめてください。
                                        </p>
                                    </div>
                                </div>
                            ) : activeMode === 'full' ? (
                                <div className="w-full fade-in space-y-16 text-center">
                                    <h1 className="text-4xl font-light tracking-[0.6em]">満月</h1>
                                    <p className="text-sm opacity-50 italic">満月の夜、アーカイブは開かれます。</p>
                                    <div className="p-10 border border-current/20 bg-white/5 rounded-xl backdrop-blur-lg">
                                        <p className="text-xs opacity-30 italic leading-loose">
                                            （GitHub Pages等の外部公開時にFirebaseを設定することで、ここに観測日記の投稿フォームが表示されます）
                                        </p>
                                    </div>
                                </div>
                            ) : (
                                <div className="py-16 fade-in space-y-10">
                                    <p className="opacity-60 text-sm tracking-[1.0em] uppercase">{data.phase.nameJp}</p>
                                    <div className="text-[12px] opacity-70 italic space-y-6 leading-loose">
                                        <p>世界はゆっくりと光を蓄え、あるいは光を返しています。<br/>聖域は静かに次の満ち欠けを待っています。</p>
                                        <div className="flex justify-center gap-6 sm:gap-8 tracking-widest text-[10px] font-sans opacity-60">
                                           <span>月齢: {data.age.toFixed(1)}</span>
                                           <span>次なる頂: {data.age < 14.7 ? '満月' : '新月'}</span>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>

                    <div className="fixed bottom-10 left-6 sm:left-10 flex gap-4 opacity-0 hover:opacity-100 transition-opacity z-50">
                        {['new', 'full', 'auto'].map(m => (
                            <button key={m} onClick={() => setPreviewMode(m)} className="px-4 py-2 border border-current/40 rounded-full text-[10px] uppercase tracking-widest hover:bg-white hover:text-black transition-all">
                                {m}
                            </button>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
